<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/cart.css">
  <link rel="stylesheet" href="/css/footer.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="cart-layout">
      <section>
        <h1>Your Cart</h1>
        <div id="cart-items" class="cart-items"></div>
      </section>
      <aside class="summary">
        <h2>Order Summary</h2>
        <div class="summary-row"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
        <div class="summary-row"><span>Shipping</span><strong id="shipping">Free</strong></div>
        <div class="summary-row summary-total"><span>Total</span><strong id="total">$0.00</strong></div>
        <a href="/checkout.html" class="btn" style="display:block;text-align:center;margin-top:1rem">Proceed to Checkout</a>
      </aside>
    </div>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="/js/cart.js"></script>
</body>
</html>
