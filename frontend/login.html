<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/footer.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="auth-shell">
    <section class="auth-card">
      <h1>Welcome back</h1>
      <p>Log in to continue to checkout and manage your account.</p>

      <form id="login-form" class="auth-form">
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="auth-message" id="login-message" aria-live="polite"></div>
        <button class="btn" type="submit">Login</button>
      </form>

      <div class="auth-footer">
        <span class="auth-muted">No account yet?</span> <a class="auth-link" href="/register.html">Create one</a>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="/js/login.js"></script>
</body>
</html>
